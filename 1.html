<html lang="en">

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f3f7;
            color: #333;
            line-height: 1.6;
        }

        header {

            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        header h1 {
            color: #dfc5fe;
            margin-bottom: 5px;
            font-family: Georgia, serif;
            letter-spacing: 1px;
        }

        header p {
            color: #bfa3e0;
            font-size: 1rem;
        }

        /* Main Container */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            margin: 40px 0 20px 0;
            color: #2e1a47;
            font-family: Georgia, serif;
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 20px;
        }

            padding: 25px;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #e1dbe9;
        }
